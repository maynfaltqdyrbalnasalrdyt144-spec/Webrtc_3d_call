<!DOCTYPE html>
<html>
<head>
    <title>مكالمة 3D</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; text-align: center; background: #111; color: #fff; padding:20px; }
        button { padding: 15px 30px; font-size: 18px; margin: 10px; background:#3498db; color:#fff; border:none; border-radius:8px; }
        .user { width: 80px; height: 80px; border-radius: 50%; background: #3498db; 
                display: inline-block; margin: 20px; line-height: 80px; }
    </style>
</head>
<body>
    <h1>مكالمة صوتية ثلاثية الأبعاد</h1>
    <button id="startBtn">ابدأ المكالمة</button>
    <div id="room">
        <div class="user" id="me">أنا</div>
        <div class="user" id="friend" style="background:#e74c3c">صاحبي</div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "resonance-audio": "https://cdn.jsdelivr.net/npm/resonance-audio/build/resonance-audio.min.js"
      }
    }
    </script>
    
    <script type="module" src="main.js"></script>
</body>
  </html>
